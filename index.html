<!-- Partners Roster — single-file internal employee database.      -->
<!-- Stack: React 18 + Firebase (compat) via CDN. No build step.    -->
<!-- Open the file in a browser and it runs. Firebase is optional   -->
<!-- (see CONFIG below): with USE_FIREBASE=false it runs fully on    -->
<!-- seeded/local data; flip it on to make Firestore the live DB.    -->
<!-- ============================================================= -->

<style>
:root{
  --teal:#1A8C8C; --teal-dark:#136969; --teal-light:#E6F7F7;
  --gold:#F0A520; --gold-dark:#C8861A; --gold-light:#FEF6E4;
  --warm:#8B7D6B; --warm-light:#F4EFE9;
  --dark:#1A2E3B; --mid:#4A5A66; --muted:#7A8A96;
  --border:#E0E8EC; --white:#FFFFFF; --offwhite:#F7F9FA; --surface:#EFF4F7;
  --green:#2E9E6B; --red:#D94F4F;
  --sidebar:#16262F; --sidebar-hover:#20323d;
  --shadow-sm:0 1px 2px rgba(26,46,59,.06),0 1px 3px rgba(26,46,59,.08);
  --shadow-md:0 4px 12px rgba(26,46,59,.10);
  --shadow-lg:0 12px 40px rgba(26,46,59,.22);
  --r:10px; --r-sm:7px;
  --ff-disp:'Barlow Condensed',system-ui,sans-serif;
  --ff-body:'Barlow',system-ui,sans-serif;
  --ff-serif:'Lora',Georgia,serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--ff-body);color:var(--dark);background:var(--offwhite);
  -webkit-font-smoothing:antialiased;font-size:15px;line-height:1.45}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--teal);text-decoration:none}
h1,h2,h3,h4{margin:0;font-family:var(--ff-disp);font-weight:700;
  text-transform:uppercase;letter-spacing:.4px;color:var(--dark)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#c7d3d9;border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:#aebcc4}

/* ---------- Boot / loading ---------- */
#boot{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:18px;background:var(--offwhite);z-index:9999}
#boot .pulse{width:54px;height:54px;animation:bp 1.4s ease-in-out infinite}
@keyframes bp{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.08);opacity:1}}
#boot .lbl{font-family:var(--ff-disp);text-transform:uppercase;letter-spacing:2px;
  color:var(--muted);font-weight:700;font-size:13px}

/* ---------- PIN gate ---------- */
.gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(155deg,#16262F 0%,#1A2E3B 55%,#123c3c 120%);z-index:500;padding:20px}
.gate-card{background:var(--white);border-radius:16px;box-shadow:var(--shadow-lg);
  width:100%;max-width:400px;padding:38px 34px 30px;text-align:center}
.gate-logo{width:56px;height:56px;margin:0 auto 14px}
.gate-card h1{font-size:27px;letter-spacing:.6px}
.gate-tag{font-family:var(--ff-serif);font-style:italic;color:var(--teal);
  font-size:16px;margin:2px 0 22px}
.gate-card .sub{color:var(--muted);font-size:13.5px;margin:-14px 0 22px;text-transform:none;
  font-family:var(--ff-body);letter-spacing:0}
.pin-in{width:100%;text-align:center;font-size:26px;letter-spacing:12px;font-weight:600;
  padding:14px 10px;border:2px solid var(--border);border-radius:var(--r);color:var(--dark);
  outline:none;transition:border-color .15s}
.pin-in:focus{border-color:var(--teal)}
.pin-in.err{border-color:var(--red);animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.gate-err{color:var(--red);font-size:13px;margin-top:10px;min-height:16px}
.gate-hint{margin-top:16px;font-size:12px;color:var(--muted)}

/* ---------- Buttons ---------- */
.btn{border:none;border-radius:var(--r-sm);padding:9px 16px;font-weight:600;font-size:14px;
  display:inline-flex;align-items:center;gap:7px;transition:.15s;white-space:nowrap}
.btn-primary{background:var(--teal);color:#fff}
.btn-primary:hover{background:var(--teal-dark)}
.btn-gold{background:var(--gold);color:#3a2a05}
.btn-gold:hover{background:var(--gold-dark);color:#fff}
.btn-ghost{background:transparent;color:var(--mid);border:1.5px solid var(--border)}
.btn-ghost:hover{border-color:var(--teal);color:var(--teal)}
.btn-danger{background:transparent;color:var(--red);border:1.5px solid #f0cccc}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-lg{padding:13px 20px;font-size:15px;width:100%;justify-content:center}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ---------- Shell ---------- */
.shell{display:flex;min-height:100vh}
.sidebar{width:238px;background:var(--sidebar);color:#cdd8de;flex-shrink:0;
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sb-brand{padding:20px 20px 16px;display:flex;align-items:center;gap:11px;
  border-bottom:1px solid rgba(255,255,255,.07)}
.sb-brand .mk{width:34px;height:34px;flex-shrink:0}
.sb-brand .nm{font-family:var(--ff-disp);font-weight:800;text-transform:uppercase;
  letter-spacing:.5px;color:#fff;font-size:18px;line-height:1}
.sb-brand .nm small{display:block;font-size:10.5px;letter-spacing:2px;color:var(--teal);
  font-weight:600;margin-top:3px}
.sb-nav{padding:14px 12px;flex:1;overflow-y:auto}
.sb-eyebrow{font-family:var(--ff-disp);text-transform:uppercase;letter-spacing:2px;
  font-size:10.5px;color:#5f7883;font-weight:700;padding:12px 12px 7px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--r-sm);
  color:#b7c6ce;font-weight:500;font-size:14.5px;cursor:pointer;transition:.13s;margin-bottom:2px}
.nav-item:hover{background:var(--sidebar-hover);color:#fff}
.nav-item.active{background:var(--teal);color:#fff;font-weight:600}
.nav-item .ic{width:18px;height:18px;flex-shrink:0}
.nav-item .ct{margin-left:auto;background:rgba(255,255,255,.12);border-radius:20px;
  font-size:11px;padding:1px 8px;font-weight:600}
.nav-item.active .ct{background:rgba(255,255,255,.22)}
.sb-foot{padding:14px 16px;border-top:1px solid rgba(255,255,255,.07);font-size:11px;color:#5f7883}
.sb-foot .tag{font-family:var(--ff-serif);font-style:italic;color:var(--teal);font-size:13px}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:13px 26px;
  display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:40}
.search-wrap{flex:1;max-width:520px;position:relative}
.search-wrap .si{position:absolute;left:13px;top:50%;transform:translateY(-50%);
  width:17px;height:17px;color:var(--muted)}
.search-in{width:100%;padding:10px 12px 10px 38px;border:1.5px solid var(--border);
  border-radius:var(--r);background:var(--offwhite);outline:none;transition:.15s;font-size:14px}
.search-in:focus{border-color:var(--teal);background:#fff}
.topbar-sp{flex:1}
.icon-btn{width:38px;height:38px;border-radius:var(--r-sm);border:1.5px solid var(--border);
  background:#fff;display:flex;align-items:center;justify-content:center;color:var(--mid);transition:.15s}
.icon-btn:hover{border-color:var(--teal);color:var(--teal)}
.page{padding:26px;max-width:1400px;width:100%;margin:0 auto}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;
  margin-bottom:22px;gap:16px;flex-wrap:wrap}
.page-head h1{font-size:30px;letter-spacing:.5px}
.page-head .eyebrow{font-family:var(--ff-disp);text-transform:uppercase;letter-spacing:2.5px;
  font-size:11px;color:var(--teal);font-weight:700;margin-bottom:4px}
.page-head .sub{color:var(--muted);font-size:13.5px;margin-top:3px}

/* ---------- Dashboard ---------- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(184px,1fr));gap:14px;margin-bottom:22px}
.stat{background:var(--white);border:1px solid var(--border);border-radius:var(--r);
  padding:16px 17px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;
  cursor:pointer;transition:.15s}
.stat:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--teal)}
.stat.gold::before{background:var(--gold)} .stat.warm::before{background:var(--warm)}
.stat.alert::before{background:var(--red)} .stat.green::before{background:var(--green)}
.stat .k{font-family:var(--ff-disp);text-transform:uppercase;letter-spacing:1.2px;
  font-size:11.5px;color:var(--muted);font-weight:600}
.stat .v{font-family:var(--ff-disp);font-weight:800;font-size:36px;line-height:1;
  color:var(--dark);margin-top:6px}
.stat .v small{font-size:15px;color:var(--muted);font-weight:600}
.dash-cols{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:900px){.dash-cols{grid-template-columns:1fr}}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-sm)}
.card-h{padding:15px 18px;border-bottom:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-between}
.card-h h3{font-size:16px}
.card-h .eyebrow{font-family:var(--ff-disp);text-transform:uppercase;letter-spacing:2px;
  font-size:10px;color:var(--teal);font-weight:700}
.mini-list{padding:6px 0}
.mini-row{display:flex;align-items:center;gap:12px;padding:9px 18px;cursor:pointer;transition:.1s}
.mini-row:hover{background:var(--offwhite)}
.mini-row .nm{font-weight:600;font-size:14px}
.mini-row .mt{color:var(--muted);font-size:12.5px;margin-left:auto;text-align:right}

/* ---------- Avatar ---------- */
.av{border-radius:50%;background:var(--teal-light);color:var(--teal-dark);display:flex;
  align-items:center;justify-content:center;font-family:var(--ff-disp);font-weight:700;
  text-transform:uppercase;flex-shrink:0;overflow:hidden;position:relative}
.av img{width:100%;height:100%;object-fit:cover}
.av.ring{box-shadow:0 0 0 2px #fff,0 0 0 4px var(--gold)}
.av-24{width:24px;height:24px;font-size:10px}
.av-32{width:32px;height:32px;font-size:12px}
.av-40{width:40px;height:40px;font-size:14px}
.av-96{width:96px;height:96px;font-size:32px}

/* ---------- Filter bar + grid ---------- */
.filterbar{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin-bottom:14px}
.fsel{padding:8px 11px;border:1.5px solid var(--border);border-radius:var(--r-sm);
  background:#fff;color:var(--mid);font-size:13.5px;outline:none;cursor:pointer;max-width:170px}
.fsel:focus{border-color:var(--teal)}
.chip{display:inline-flex;align-items:center;gap:6px;padding:7px 11px;border-radius:20px;
  border:1.5px solid var(--border);background:#fff;font-size:13px;color:var(--mid);cursor:pointer;transition:.13s}
.chip:hover{border-color:var(--teal)}
.chip.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.chip.on.gold{background:var(--gold);border-color:var(--gold);color:#3a2a05}
.grid-wrap{background:#fff;border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;box-shadow:var(--shadow-sm)}
.grid-scroll{overflow-x:auto}
table.roster{width:100%;border-collapse:collapse;min-width:900px}
.roster thead th{background:var(--surface);text-align:left;padding:11px 14px;
  font-family:var(--ff-disp);text-transform:uppercase;letter-spacing:.8px;font-size:11.5px;
  color:var(--mid);font-weight:700;border-bottom:1px solid var(--border);
  white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0}
.roster thead th:hover{color:var(--teal)}
.roster thead th .ar{opacity:.4;margin-left:3px}
.roster tbody td{padding:11px 14px;border-bottom:1px solid #eef3f5;font-size:13.5px;vertical-align:middle}
.roster tbody tr{cursor:pointer;transition:.09s}
.roster tbody tr:hover{background:var(--teal-light)}
.roster tbody tr:last-child td{border-bottom:none}
.cell-nm{display:flex;align-items:center;gap:10px}
.cell-nm .nm{font-weight:600;color:var(--dark)}
.cell-nm .em{font-size:11.5px;color:var(--muted)}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;
  font-family:var(--ff-disp);text-transform:uppercase;letter-spacing:.5px}
.b-teal{background:var(--teal-light);color:var(--teal-dark)}
.b-gold{background:var(--gold-light);color:var(--gold-dark)}
.b-warm{background:var(--warm-light);color:var(--warm)}
.b-green{background:#e3f4ec;color:var(--green)}
.b-red{background:#fbe9e9;color:var(--red)}
.b-gray{background:#eef3f5;color:var(--muted)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.grid-foot{padding:11px 16px;color:var(--muted);font-size:13px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between}
.empty{padding:56px 20px;text-align:center;color:var(--muted)}
.empty h3{color:var(--mid);font-size:18px;margin-bottom:6px}

/* ---------- Drawer ---------- */
.scrim{position:fixed;inset:0;background:rgba(20,35,45,.42);z-index:100;
  animation:fade .18s;backdrop-filter:blur(1px)}
@keyframes fade{from{opacity:0}to{opacity:1}}
.drawer{position:fixed;top:0;right:0;bottom:0;width:640px;max-width:96vw;background:var(--offwhite);
  z-index:101;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;animation:slidein .24s cubic-bezier(.2,.7,.3,1)}
@keyframes slidein{from{transform:translateX(40px);opacity:.4}to{transform:translateX(0);opacity:1}}
.dr-head{background:linear-gradient(135deg,#16262F,#1A2E3B 70%,#154545);color:#fff;
  padding:22px 24px 18px;display:flex;gap:16px;align-items:flex-start;position:relative}
.dr-head .close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.13);
  border:none;color:#fff;width:32px;height:32px;border-radius:8px;font-size:17px}
.dr-head .close:hover{background:rgba(255,255,255,.24)}
.dr-head h2{color:#fff;font-size:25px;letter-spacing:.4px}
.dr-head .role{color:#8fd6d6;font-family:var(--ff-body);text-transform:none;font-weight:500;
  font-size:14px;letter-spacing:0;margin-top:3px}
.dr-head .idpill{margin-top:8px;display:inline-block;background:rgba(255,255,255,.12);
  padding:2px 10px;border-radius:6px;font-size:12px;font-family:var(--ff-disp);letter-spacing:1px}
.dr-tabs{display:flex;gap:2px;background:#fff;border-bottom:1px solid var(--border);
  padding:0 14px;overflow-x:auto;position:sticky;top:0;z-index:2}
.dr-tab{padding:12px 13px;font-family:var(--ff-disp);text-transform:uppercase;letter-spacing:.7px;
  font-size:12.5px;font-weight:600;color:var(--muted);border-bottom:2.5px solid transparent;
  white-space:nowrap;cursor:pointer;transition:.12s}
.dr-tab:hover{color:var(--mid)}
.dr-tab.active{color:var(--teal);border-bottom-color:var(--teal)}
.dr-body{flex:1;overflow-y:auto;padding:22px 24px 40px}
.dr-actions{padding:14px 24px;background:#fff;border-top:1px solid var(--border);
  display:flex;gap:10px;justify-content:flex-end}
.fld{margin-bottom:15px}
.fld-row{display:grid;grid-template-columns:150px 1fr;gap:14px;padding:9px 0;
  border-bottom:1px dashed #e6eef1;align-items:baseline}
.fld-row .k{font-family:var(--ff-disp);text-transform:uppercase;letter-spacing:.7px;
  font-size:11.5px;color:var(--muted);font-weight:700}
.fld-row .val{font-size:14.5px;color:var(--dark);word-break:break-word}
.fld-row .val.empty-v{color:#b3c0c8;font-style:italic}
.sec-title{font-family:var(--ff-disp);text-transform:uppercase;letter-spacing:1.5px;
  font-size:12px;color:var(--teal);font-weight:700;margin:22px 0 8px;padding-bottom:6px;
  border-bottom:2px solid var(--teal-light)}
.sec-title:first-child{margin-top:0}
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:6px}
.prod-box{background:#fff;border:1px solid var(--border);border-radius:var(--r-sm);padding:14px 16px}
.prod-box .yr{font-family:var(--ff-disp);letter-spacing:1px;color:var(--muted);font-size:12px;text-transform:uppercase;font-weight:700}
.prod-box .amt{font-family:var(--ff-disp);font-weight:800;font-size:26px;color:var(--dark);margin-top:4px}
.prod-box .un{color:var(--teal-dark);font-size:13px;font-weight:600;margin-top:2px}
.check-list{list-style:none;padding:0;margin:0}
.check-list li{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dashed #e6eef1;font-size:14px}
.check-list .cbox{width:20px;height:20px;border-radius:5px;flex-shrink:0;display:flex;
  align-items:center;justify-content:center;font-size:12px}
.check-list .done{background:var(--green);color:#fff}
.check-list .todo{background:#eef3f5;color:#b3c0c8;border:1px solid var(--border)}
.tags{display:flex;flex-wrap:wrap;gap:6px}

/* ---------- Form ---------- */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid.one{grid-template-columns:1fr}
@media(max-width:560px){.form-grid{grid-template-columns:1fr}}
.f-label{font-family:var(--ff-disp);text-transform:uppercase;letter-spacing:.7px;
  font-size:11px;color:var(--mid);font-weight:700;display:block;margin-bottom:5px}
.f-in{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:var(--r-sm);
  outline:none;transition:.13s;background:#fff}
.f-in:focus{border-color:var(--teal)}
textarea.f-in{resize:vertical;min-height:66px}
.photo-up{display:flex;align-items:center;gap:16px;margin-bottom:18px;padding:16px;
  background:#fff;border:1px dashed var(--border);border-radius:var(--r)}
.tog{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px dashed #e6eef1}
.tog .sw{width:40px;height:23px;border-radius:20px;background:#d5dee2;position:relative;transition:.15s;flex-shrink:0}
.tog .sw.on{background:var(--teal)}
.tog .sw::after{content:"";position:absolute;top:2.5px;left:3px;width:18px;height:18px;
  border-radius:50%;background:#fff;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog .sw.on::after{left:19px}
.tog .lbl{font-size:14px;font-weight:500}

/* ---------- Toast ---------- */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--dark);
  color:#fff;padding:12px 22px;border-radius:var(--r);box-shadow:var(--shadow-lg);z-index:600;
  font-size:14px;font-weight:500;display:flex;align-items:center;gap:9px;animation:tin .25s}
@keyframes tin{from{transform:translate(-50%,14px);opacity:0}to{transform:translate(-50%,0);opacity:1}}
.toast.ok .d{color:#7ee0b0} .toast.err .d{color:#ff9a9a}

/* ---------- Settings / integration ---------- */
.set-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);
  padding:20px 22px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.set-card h3{font-size:16px;margin-bottom:4px}
.set-card .desc{color:var(--muted);font-size:13.5px;margin-bottom:14px}
.status-pill{display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border-radius:20px;
  font-size:12.5px;font-weight:600;font-family:var(--ff-disp);letter-spacing:.5px;text-transform:uppercase}
pre.code{background:#16262F;color:#cde;padding:15px 17px;border-radius:var(--r-sm);
  overflow-x:auto;font-size:12.5px;line-height:1.55;font-family:ui-monospace,Menlo,monospace}
pre.code .c{color:#6b8a96} pre.code .k{color:#8fd6d6} pre.code .s{color:#f0c987}
.mobile-only{display:none}
@media(max-width:820px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:200;transform:translateX(-100%);transition:transform .22s}
  .sidebar.open{transform:translateX(0)}
  .mobile-only{display:flex}
  .page{padding:18px}
  .fld-row{grid-template-columns:1fr;gap:2px}
}
</style>

/* ============================================================================
   DATA LAYER — one interface, two backends (local | firebase)
   ============================================================================ */
var fb = null, frt = null, fstore = null;
(function initFirebase(){
  if (!CONFIG.USE_FIREBASE) return;
  try {
    fb = firebase.apps && firebase.apps.length ? firebase.app() : firebase.initializeApp(CONFIG.firebaseConfig);
    frt = fb.database();
    try { fstore = fb.storage(); } catch(e){ fstore = null; }
  } catch(e){ console.error("Firebase init failed — falling back to local mode.", e); CONFIG.USE_FIREBASE = false; }
})();

/* -------------------------------------------------------------------------
   Funding Hype Board photo sync.
   The Hype Board (same Firebase project) keeps its LO list in the Realtime
   Database at /roster as { lo_<name>: {name, photo} }. "photo" is either a
   pasted image URL or an uploaded image saved as a data URL. This reads that
   node once and returns a map of normalized-name -> photo, so the roster can
   match by name and fill in headshots. Works even while the roster itself is
   in local mode — it only needs read access to the Hype Board's roster node.
   ------------------------------------------------------------------------- */
function normName(s){ return String(s||"").toLowerCase().replace(/[^a-z0-9]/g,""); }
function hypeKey(name){ return "lo_" + String(name||"").toLowerCase().replace(/[^a-z0-9\s]/g,"").trim().replace(/\s+/g,"_"); }
// Who gets pushed to the Hype Board, per CONFIG.HYPE_PUSH_SCOPE.
function inHypeScope(emp){
  if(!emp) return false;
  var scope = CONFIG.HYPE_PUSH_SCOPE || "nmls";
  if(scope==="all") return true;
  if(scope==="los") return !!emp.isLoanOfficer;
  return !!String(emp.nmls||"").trim(); // "nmls": has an NMLS number
}

// Read the Hype Board /roster node once → {key: {name, photo}}
async function readHypeRoster(){
  if(typeof firebase==="undefined" || !firebase.database) throw new Error("Firebase database library not loaded (needs an internet connection).");
  var app;
  try { app = fb || firebase.initializeApp(CONFIG.firebaseConfig, "hypeboard-read"); }
  catch(e){ app = firebase.app("hypeboard-read"); }
  var snap = await app.database().ref(CONFIG.ROSTER_PATH).once("value");
  return { app:app, roster:(snap.val()||{}) };
}

// name → photo map, for pulling photos into the roster
async function fetchHypeBoardPhotos(){
  var r = await readHypeRoster(), map = {};
  Object.keys(r.roster).forEach(function(k){
    var rec = r.roster[k]; if(!rec) return;
    if(rec.photo && String(rec.photo).trim()) map[normName(rec.name||k.replace(/^lo_/,""))] = rec.photo;
  });
  return map;
}

/* Mirror one employee up to the Hype Board's /roster, deduping by name the
   same way the Hype Board does. Active + in-scope → upsert; otherwise remove.
   Never wipes a photo the Hype Board already has when the roster has none. */
async function mirrorToHypeBoard(emp){
  if(!CONFIG.HYPE_SYNC || !frt || !emp || !emp.fullName) return;
  var inScope = inHypeScope(emp);
  var r;
  try { r = await readHypeRoster(); } catch(e){ console.warn("Hype sync skipped:", e.message); return; }
  var roster = r.roster, target = normName(emp.fullName), existingId = null;
  Object.keys(roster).forEach(function(k){ if(roster[k] && normName(roster[k].name)===target) existingId = k; });

  if(emp.status==="active" && inScope){
    var id = existingId || hypeKey(emp.fullName);
    var patch = { name: emp.fullName };
    if(emp.photoUrl && String(emp.photoUrl).trim()) patch.photo = emp.photoUrl;      // push roster photo up
    else if(!existingId) patch.photo = null;                                          // brand-new entry, no photo yet
    try { await frt.ref(CONFIG.ROSTER_PATH+"/"+id).update(patch); } catch(e){ console.warn("Hype push failed:", e.message); }
  } else if(existingId){
    // deactivated or out of scope → drop from the Hype Board list
    try { await frt.ref(CONFIG.ROSTER_PATH+"/"+existingId).remove(); } catch(e){ console.warn("Hype remove failed:", e.message); }
  }
}

/* Push every active (in-scope) employee up to the Hype Board in one write,
   deduping by name so we reuse existing entries instead of duplicating. */
async function pushAllToHype(list){
  if(!CONFIG.HYPE_SYNC || !frt) return {pushed:0};
  var r;
  try { r = await readHypeRoster(); } catch(e){ console.warn("Push-all skipped:", e.message); return {pushed:0}; }
  var roster = r.roster, byName = {};
  Object.keys(roster).forEach(function(k){ if(roster[k]) byName[normName(roster[k].name)] = k; });
  var updates = {}, pushed = 0;
  (list||[]).forEach(function(e){
    if(!e.fullName || e.status!=="active") return;
    if(!inHypeScope(e)) return;
    var key = byName[normName(e.fullName)] || hypeKey(e.fullName);
    var existing = roster[key];
    var photo = (e.photoUrl && String(e.photoUrl).trim()) ? e.photoUrl : (existing && existing.photo) || null;
    updates[key] = { name: e.fullName, photo: photo };
    pushed++;
  });
  try { await frt.ref(CONFIG.ROSTER_PATH).update(updates); } catch(e){ console.warn("Push-all write failed:", e.message); return {pushed:0}; }
  return {pushed:pushed};
}

var LS_KEY = "pm_roster_v1";
var LS_PIN = "pm_roster_pin";
var LS_SETTINGS = "pm_roster_settings";

/* Resilient storage. Some browsers block localStorage when a file is opened
   directly (file://) or in strict privacy modes; touching it there throws.
   We probe once, then fall back to an in-memory store so the app always runs.
   (In-memory data lasts for the session; host the file or enable Firebase to
   persist across reloads.) */
var _MEM = {};
var STORAGE_OK = (function(){
  try { var k="__pm_probe"; window.localStorage.setItem(k,"1"); window.localStorage.removeItem(k); return true; }
  catch(e){ return false; }
})();
function lsGet(k){
  if(STORAGE_OK){ try{ return window.localStorage.getItem(k); }catch(e){ STORAGE_OK=false; } }
  return (k in _MEM) ? _MEM[k] : null;
}
function lsSet(k,v){
  _MEM[k]=v;
  if(STORAGE_OK){ try{ window.localStorage.setItem(k,v); }catch(e){ STORAGE_OK=false; } }
}
function lsDel(k){
  delete _MEM[k];
  if(STORAGE_OK){ try{ window.localStorage.removeItem(k); }catch(e){ STORAGE_OK=false; } }
}
var _SESS = {};
function ssGet(k){ try{ return window.sessionStorage.getItem(k); }catch(e){ return (k in _SESS)?_SESS[k]:null; } }
function ssSet(k,v){ _SESS[k]=v; try{ window.sessionStorage.setItem(k,v); }catch(e){} }

function loadSettings(){
  try{ var s = JSON.parse(lsGet(LS_SETTINGS)||"{}");
       if(s.pin) CONFIG.ACCESS_PIN = s.pin; return s; }catch(e){ return {}; }
}
loadSettings();

var DB = {
  mode: CONFIG.USE_FIREBASE ? "firebase" : "local",

  async list(){
    if (this.mode === "firebase"){
      try {
        var snap = await frt.ref(CONFIG.EMPLOYEES_PATH).once("value");
        var val = snap.val();
        if (val && Object.keys(val).length){
          return Object.keys(val).map(function(k){ return val[k]; });
        }
        // Empty database → one-time seed from the built-in roster, then mirror everyone up.
        var updates = {};
        SEED_DATA.forEach(function(e){ updates[e.employeeId] = e; });
        try { await frt.ref(CONFIG.EMPLOYEES_PATH).update(updates); } catch(e){ console.warn("Seed write failed:", e.message); }
        pushAllToHype(SEED_DATA);
        return SEED_DATA.slice();
      } catch(e){
        console.error("Firebase read failed — using local seed.", e);
        this.mode = "local"; CONFIG.USE_FIREBASE = false;
        return SEED_DATA.slice();
      }
    }
    var raw = lsGet(LS_KEY);
    if (!raw){ lsSet(LS_KEY, JSON.stringify(SEED_DATA)); return SEED_DATA.slice(); }
    try { return JSON.parse(raw); } catch(e){ return SEED_DATA.slice(); }
  },

  async save(emp){
    emp.updatedAt = new Date().toISOString();
    if (this.mode === "firebase"){
      await frt.ref(CONFIG.EMPLOYEES_PATH+"/"+emp.employeeId).set(emp);
      await mirrorToHypeBoard(emp);   // flow the person up to the Hype Board
      return emp;
    }
    var all = await this.list();
    var i = all.findIndex(function(e){ return e.employeeId === emp.employeeId; });
    if (i >= 0) all[i] = emp; else all.push(emp);
    lsSet(LS_KEY, JSON.stringify(all));
    return emp;
  },

  async setStatus(id, status){
    var all = await this.list();
    var e = all.find(function(x){ return x.employeeId===id; });
    if(!e) return;
    e.status = status;
    if(status==="inactive" && !e.offboardingDate) e.offboardingDate = new Date().toISOString().slice(0,10);
    return this.save(e);
  },

  // Photo: firebase -> Storage; local -> data URL kept on the record.
  async uploadPhoto(emp, file){
    if (this.mode === "firebase" && fstore){
      var path = "employee-photos/"+emp.employeeId+"/"+Date.now()+"_"+file.name;
      var ref = fstore.ref().child(path);
      await ref.put(file);
      var url = await ref.getDownloadURL();
      return { photoUrl:url, photoStoragePath:path, photoUpdatedAt:new Date().toISOString() };
    }
    var dataUrl = await new Promise(function(res,rej){
      var r = new FileReader(); r.onload=function(){res(r.result);}; r.onerror=rej; r.readAsDataURL(file);
    });
    return { photoUrl:dataUrl, photoStoragePath:"local:"+file.name, photoUpdatedAt:new Date().toISOString() };
  },

  nextId(all){
    var max = 0;
    all.forEach(function(e){ var m = /PM-(\d+)/.exec(e.employeeId||""); if(m) max = Math.max(max, +m[1]); });
    return "PM-" + String(max+1).padStart(4,"0");
  }
};

/* ---------------------------- Grid ---------------------------- */
function GridView(p){
  var _sort=useState({key:"fullName",dir:1}),sort=_sort[0],setSort=_sort[1];
  var f = p.filters||{};
  function setF(patch){ p.setFilters(Object.assign({},f,patch)); }
  function clearF(){ p.setFilters({}); }

  var opts = useMemo(function(){
    function uniq(fn){ var s={}; p.emps.forEach(function(e){var v=fn(e); if(v) s[v]=1;}); return Object.keys(s).sort(); }
    return {
      branches:uniq(function(e){return e.branch;}),
      teams:uniq(function(e){return e.team;}),
      roles:uniq(function(e){return e.role;}),
      states:(function(){var s={};p.emps.forEach(function(e){(e.stateLicenses||[]).forEach(function(x){if(x)s[x]=1;});});return Object.keys(s).sort();})()
    };
  },[p.emps]);

  var rows = useMemo(function(){
    var q = (p.q||"").toLowerCase().trim();
    var out = p.emps.filter(function(e){
      if(q){
        var hay=[e.fullName,e.email,e.nmls,e.branch,e.team,e.role].join(" ").toLowerCase();
        if(hay.indexOf(q)<0) return false;
      }
      if(f.status && f.status!=="all" && e.status!==f.status) return false;
      if(!f.status && e.status!=="active" && !f.showInactive) { /* default active-first but keep all if filter set */ }
      if(f.branch && e.branch!==f.branch) return false;
      if(f.team && e.team!==f.team) return false;
      if(f.role && e.role!==f.role) return false;
      if(f.emptype && e.employmentType!==f.emptype) return false;
      if(f.state && (e.stateLicenses||[]).indexOf(f.state)<0) return false;
      if(f.noPhoto && e.photoUrl) return false;
      if(f.noNmls && (e.nmls || !e.isLoanOfficer)) return false;
      if(f.noState && ((e.stateLicenses&&e.stateLicenses.length) || !e.isLoanOfficer)) return false;
      if(f.noComp && e.compPlan) return false;
      if(f.onbInc && e.onboarding && e.onboarding.complete) return false;
      if(f.coach && !(e.toolAccess&&e.toolAccess.mortgageCoach)) return false;
      return true;
    });
    var k=sort.key, d=sort.dir;
    out.sort(function(a,b){
      var va,vb;
      if(k==="volume2026"){va=a.production.volume2026;vb=b.production.volume2026;}
      else if(k==="hireDate"){va=a.hireDate||"";vb=b.hireDate||"";}
      else {va=(a[k]||"").toString().toLowerCase();vb=(b[k]||"").toString().toLowerCase();}
      if(va<vb)return -1*d; if(va>vb)return 1*d; return 0;
    });
    return out;
  },[p.emps,p.q,f,sort]);

  function th(key,label){
    var on = sort.key===key;
    return h("th",{onClick:function(){ setSort({key:key,dir: on? -sort.dir : 1}); }},
      label, h("span",{className:"ar"}, on ? (sort.dir>0?"▲":"▼") : "↕"));
  }
  var activeFilterCount = Object.keys(f).filter(function(k){return f[k];}).length;

  function exportCsv(){
    var cols=["employeeId","fullName","role","division","team","branch","email","phone","nmls","dre","employmentType","status","hireDate","volume2026","units2026","mortgageCoach"];
    var lines=[cols.join(",")];
    rows.forEach(function(e){
      var r=[e.employeeId,e.fullName,e.role,e.division,e.team,e.branch,e.email,e.phone,e.nmls,e.dre,e.employmentType,e.status,e.hireDate,e.production.volume2026,e.production.units2026,(e.toolAccess&&e.toolAccess.mortgageCoach)?"Y":""];
      lines.push(r.map(function(v){v=(v==null?"":String(v)); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}).join(","));
    });
    var blob=new Blob([lines.join("\n")],{type:"text/csv"});
    var a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download="partners-roster-"+new Date().toISOString().slice(0,10)+".csv"; a.click();
  }

  function exportXlsx(){
    if(typeof XLSX==="undefined"){ alert("Excel library didn't load (need an internet connection the first time). Use Export CSV instead — it opens in Excel too."); return; }
    // Mirrors the columns of the original uploaded "Employee Roster" workbook tab.
    var headers=["EMPLOYEE","POSITION","Division","TEAM","P/P","PROCESSOR","HIRED","EMAIL","NMLS#","DRE#","W2/1099","Graduated","Equipment","STATE"];
    var aoa=[headers];
    // export every record currently in the roster (a full mirror), stable by name
    var list=p.emps.slice().sort(function(a,b){ return (a.lastName+a.firstName).localeCompare(b.lastName+b.firstName); });
    list.forEach(function(e){
      aoa.push([
        e.fullName||"", e.role||"", e.division||"", e.team||"", e.productionPartner||"",
        e.processor||"", e.hireDate||"", e.email||"", e.nmls||"", e.dre||"",
        e.employmentType||"", (e.onboarding&&e.onboarding.complete)?"\u2713":"",
        e.equipmentStatus||"", (e.stateLicenses||[]).join(", ")
      ]);
    });
    var ws=XLSX.utils.aoa_to_sheet(aoa);
    ws["!cols"]=[{wch:22},{wch:24},{wch:9},{wch:12},{wch:16},{wch:14},{wch:11},{wch:30},{wch:11},{wch:14},{wch:9},{wch:10},{wch:12},{wch:16}];
    var wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Employee Roster");
    XLSX.writeFile(wb,"partners-roster-"+new Date().toISOString().slice(0,10)+".xlsx");
  }

  return h("div",{className:"page"},
    h("div",{className:"page-head"},
      h("div",null,
        h("div",{className:"eyebrow"},"Directory"),
        h("h1",null,"Employees"),
        h("div",{className:"sub"},rows.length+" of "+p.emps.length+" records shown")),
      h("div",{style:{display:"flex",gap:10}},
        h("button",{className:"btn btn-ghost",onClick:exportCsv},h(Icon,{n:"dl",s:16}),"Export CSV"),
        h("button",{className:"btn btn-ghost",onClick:exportXlsx},h(Icon,{n:"dl",s:16}),"Export Excel"),
        h("button",{className:"btn btn-primary",onClick:p.onNew},h(Icon,{n:"plus",s:16}),"Add employee"))
    ),
    h("div",{className:"filterbar"},
      h("select",{className:"fsel",value:f.status||"active",onChange:function(e){setF({status:e.target.value});}},
        h("option",{value:"active"},"Active"),h("option",{value:"inactive"},"Inactive"),h("option",{value:"all"},"All statuses")),
      h("select",{className:"fsel",value:f.branch||"",onChange:function(e){setF({branch:e.target.value});}},
        h("option",{value:""},"All branches"), opts.branches.map(function(b){return h("option",{key:b,value:b},b);})),
      h("select",{className:"fsel",value:f.team||"",onChange:function(e){setF({team:e.target.value});}},
        h("option",{value:""},"All teams"), opts.teams.map(function(b){return h("option",{key:b,value:b},b);})),
      h("select",{className:"fsel",value:f.role||"",onChange:function(e){setF({role:e.target.value});}},
        h("option",{value:""},"All roles"), opts.roles.map(function(b){return h("option",{key:b,value:b},b);})),
      h("select",{className:"fsel",value:f.emptype||"",onChange:function(e){setF({emptype:e.target.value});}},
        h("option",{value:""},"W2 / 1099"),h("option",{value:"W2"},"W2"),h("option",{value:"1099"},"1099")),
      h("select",{className:"fsel",value:f.state||"",onChange:function(e){setF({state:e.target.value});}},
        h("option",{value:""},"Any state license"), opts.states.map(function(b){return h("option",{key:b,value:b},b);})),
      h("span",{className:"chip"+(f.noPhoto?" on":""),onClick:function(){setF({noPhoto:!f.noPhoto});}},"No photo"),
      h("span",{className:"chip"+(f.noNmls?" on":""),onClick:function(){setF({noNmls:!f.noNmls});}},"No NMLS"),
      h("span",{className:"chip"+(f.onbInc?" on":""),onClick:function(){setF({onbInc:!f.onbInc});}},"Onboarding open"),
      h("span",{className:"chip"+(f.coach?" on gold":""),onClick:function(){setF({coach:!f.coach});}},"Mortgage Coach"),
      activeFilterCount>0 ? h("button",{className:"btn btn-ghost",style:{padding:"7px 12px"},onClick:clearF},"Clear filters") : null
    ),
    h("div",{className:"grid-wrap"},
      h("div",{className:"grid-scroll"},
        h("table",{className:"roster"},
          h("thead",null,h("tr",null,
            th("fullName","Employee"),
            th("role","Role"),
            th("team","Team"),
            th("branch","Branch"),
            th("nmls","NMLS"),
            th("employmentType","Type"),
            th("volume2026","2026 Volume"),
            th("status","Status"))),
          h("tbody",null,
            rows.map(function(e){
              return h("tr",{key:e.employeeId,onClick:function(){p.open(e);}},
                h("td",null,h("div",{className:"cell-nm"},
                  h(Avatar,{emp:e,sz:32}),
                  h("div",null,h("div",{className:"nm"},e.fullName),h("div",{className:"em"},e.email||e.employeeId)))),
                h("td",null,e.role),
                h("td",null,e.team ? h("span",{className:"badge b-teal"},e.team) : "—"),
                h("td",null,e.branch||"—"),
                h("td",null,e.nmls || (e.isLoanOfficer? h("span",{className:"badge b-red"},"missing") : "—")),
                h("td",null,e.employmentType ? h("span",{className:"badge "+(e.employmentType==="W2"?"b-warm":"b-gray")},e.employmentType):"—"),
                h("td",null,e.production.volume2026 ? fmtMoneyShort(e.production.volume2026) : "—"),
                h("td",null,h("span",null,
                  h("span",{className:"dot",style:{background:e.status==="active"?"var(--green)":"var(--muted)"}}),
                  e.status==="active"?"Active":"Inactive")));
            })
          )
        )
      ),
      rows.length===0 ? h("div",{className:"empty"},h("h3",null,"No matches"),"Try clearing filters or a different search.") : null,
      h("div",{className:"grid-foot"},
        h("span",null,rows.length+" employees"),
        h("span",null,"Click any row to open the full profile"))
    )
  );
}

    for(var i=0;i<seg.length-1;i++){ o=o[seg[i]]=o[seg[i]]||{}; }

  }
  function In(label,path,type,ph){

  function Tog(label,path){

    }catch(err){ p.flash("Photo upload failed","err"); }
    setBusy(false);
  }
  async function submit(){
    var n=JSON.parse(JSON.stringify(f));
    n.fullName=((n.firstName||"")+" "+(n.lastName||"")).trim()||n.fullName;

    n.slug=n.fullName.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
    if(typeof n.stateLicenses==="string") n.stateLicenses=n.stateLicenses.split(",").map(function(s){return s.trim();}).filter(Boolean);
    if(typeof n.branchLicenses==="string") n.branchLicenses=n.branchLicenses.split(",").map(function(s){return s.trim();}).filter(Boolean);
    if(isNew) n.createdAt=new Date().toISOString();
    setBusy(true); await p.onSave(n); setBusy(false);
  }

  var stateStr = Array.isArray(f.stateLicenses)?f.stateLicenses.join(", "):(f.stateLicenses||"");
  var branchLicStr = Array.isArray(f.branchLicenses)?f.branchLicenses.join(", "):(f.branchLicenses||"");

    h("div",{className:"scrim",onClick:p.onClose}),
    h("div",{className:"drawer"},
      h("div",{className:"dr-head"},
        h("button",{className:"close",onClick:p.onClose},"✕"),

      h("div",{className:"dr-body"},
        h("div",{className:"photo-up"},
          h(Avatar,{emp:f,sz:96,ring:true}),
          h("div",null,
            h("div",{style:{fontWeight:600,marginBottom:4}},"Headshot"),
            h("div",{style:{color:"var(--muted)",fontSize:12.5,marginBottom:9}},
              DB.mode==="firebase"?"High-res image → Firebase Storage":"Stored with the record (local mode)"),
            h("input",{ref:fileRef,type:"file",accept:"image/*",style:{display:"none"},onChange:onPhoto}),
            h("button",{className:"btn btn-ghost",disabled:busy,onClick:function(){fileRef.current.click();}},
              busy?"Uploading…":(f.photoUrl?"Replace photo":"Upload photo")))),

        h("div",{className:"sec-title"},"Identity"),
        h("div",{className:"form-grid"}, In("First name","firstName"), In("Last name","lastName")),
        h("div",{className:"form-grid"}, In("Preferred name","preferredName"), In("Employee ID","employeeId")),

        h("div",{className:"sec-title"},"Contact"),
        h("div",{className:"form-grid"}, In("Email","email","email"), In("Phone","phone")),
        h("div",{className:"form-grid one"}, In("Shipping address","personal.shippingAddress")),

        h("div",{className:"sec-title"},"Role, team & branch"),
        h("div",{className:"form-grid"},
          In("Role / position","role"),
          Sel("Division","division",["","Legacy","West","East","N/A"])),
        h("div",{className:"form-grid"}, In("Team","team"), In("Branch","branch")),
        h("div",{className:"form-grid"}, In("Production partner","productionPartner"), In("Processor","processor")),
        h("div",{className:"form-grid"},
          Sel("Employment type","employmentType",["1099","W2",""]),
          Sel("Status","status",["active","inactive"])),
        Tog("This person is a loan officer","isLoanOfficer"),

        h("div",{className:"sec-title"},"Dates"),
        h("div",{className:"form-grid"}, In("Hire date","hireDate","date"), In("Offboarding date","offboardingDate","date")),

        h("div",{className:"sec-title"},"Licensing"),

      ),
      h("div",{className:"dr-actions"},
        h("button",{className:"btn btn-ghost",onClick:p.onClose},"Cancel"),

    )

/* ---------------------------- Celebrations ---------------------------- */
function Celebrations(p){
  var now=new Date(), mo=now.getMonth();
  var active=p.emps.filter(function(e){return e.status==="active";});
  function monthOf(d){ if(!d) return -1; var x=new Date(d); return isNaN(x)?-1:x.getMonth(); }
  var bdays=active.filter(function(e){return monthOf(e.personal&&e.personal.birthday)===mo;})
    .sort(function(a,b){return new Date(a.personal.birthday).getDate()-new Date(b.personal.birthday).getDate();});
  var anniv=active.filter(function(e){return monthOf(e.hireDate)===mo;})
    .sort(function(a,b){return new Date(a.hireDate).getDate()-new Date(b.hireDate).getDate();});
  var newHires=active.filter(function(e){return daysSince(e.hireDate)<=45;})
    .sort(function(a,b){return (b.hireDate||"").localeCompare(a.hireDate||"");});
  var monthName=now.toLocaleDateString("en-US",{month:"long"});
  function yearsAt(e){ var x=new Date(e.hireDate); if(isNaN(x)) return ""; var y=now.getFullYear()-x.getFullYear(); return y>0? y+" yr"+(y>1?"s":""):"1st yr"; }

  return h("div",{className:"page"},
    h("div",{className:"page-head"},h("div",null,
      h("div",{className:"eyebrow"},"Culture & recognition"),
      h("h1",null,"Partner Celebrations"),
      h("div",{className:"sub"},monthName+" · birthdays, work anniversaries & new faces"))),
    h("div",{className:"dash-cols"},
      h(MiniCard,{title:monthName+" birthdays",eyebrow:bdays.length+" this month",rows:bdays,
        meta:function(e){return fmtDate(e.personal.birthday).replace(/, \d+$/,"");},open:p.open}),
      h(MiniCard,{title:"Work anniversaries",eyebrow:anniv.length+" this month",rows:anniv,
        meta:function(e){return yearsAt(e)+" · "+fmtDate(e.hireDate).replace(/, \d+$/,"");},open:p.open})),
    h("div",{className:"dash-cols",style:{marginTop:18}},
      h(MiniCard,{title:"Welcome aboard",eyebrow:"New in last 45 days",rows:newHires,
        meta:function(e){return fmtDate(e.hireDate);},open:p.open}),
      h("div",{className:"card"},
        h("div",{className:"card-h"},h("h3",null,"Recognition"),h("span",{className:"eyebrow"},"You matter.")),
        h("div",{style:{padding:"22px 20px"}},
          h("div",{style:{fontFamily:"var(--ff-serif)",fontStyle:"italic",fontSize:19,color:"var(--teal-dark)",lineHeight:1.5}},
            "\u201CEveryone is important, everyone contributes, everyone benefits, and everyone matters.\u201D"),
          h("div",{style:{marginTop:10,color:"var(--muted)",fontSize:13}},"— Partners Mortgage, since 1988"))))
  );
}
